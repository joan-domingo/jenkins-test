name: Trigger Jenkins

on:
  push:
    branches: [ main ]

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins Job
        run: |
          curl -X POST "https://special-fortnight-jw57w46qqj2v76-8080.app.github.dev/job/jenkins-test/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"